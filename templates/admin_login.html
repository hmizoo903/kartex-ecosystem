<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول الأدمن - KARTEX</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .form-control { background-color: #0f172a; border-color: #334155; color: #fff; }
        .form-control:focus { background-color: #0f172a; color: #fff; border-color: #3b82f6; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container" style="max-width: 420px;">
        <div class="card p-4 shadow-lg">
            <h3 class="text-center fw-bold text-primary mb-4">لوحة تحكم KARTEX</h3>
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} p-2 text-center" role="alert">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" name="username" class="form-control" required placeholder="admin">
                </div>
                <div class="mb-3">
                    <label class="form-label">كلمة السر</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mt-2 fw-bold">تسجيل الدخول</button>
            </form>
        </div>
    </div>
</body>
</html>

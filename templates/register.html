{% extends "base.html" %}

{% block content %}
<div class="glass-card auth-container">
    <div class="auth-header">
        <h2>Create Account</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Join the KARTEX simulation platform</p>
    </div>
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control" required placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Register Account</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent-secondary);">Login</a>
    </p>
</div>
{% endblock %}

<!-- قسم باقات الشراء بالفيزا -->
<div class="row mt-4">
    <div class="col-12 text-center mb-3">
        <h3>💳 Buy KTX with Credit Card / Visa</h3>
        <p class="text-muted">Instant delivery to your Kartex Wallet</p>
    </div>

    <!-- Starter Pack -->
    <div class="col-md-4 mb-3">
        <div class="card bg-dark text-white border-primary h-100">
            <div class="card-body text-center d-flex flex-column justify-content-between">
                <div>
                    <h5>Starter Pack</h5>
                    <h2 class="my-3">$10 <small class="fs-6">USD</small></h2>
                    <p>Get <strong>100 KTX</strong></p>
                </div>
                <button type="button" class="btn btn-primary w-100" onclick="openPaymentModal('starter', 'Starter Pack', 10)">
                    Pay with Visa
                </button>
            </div>
        </div>
    </div>

    <!-- Pro Pack -->
    <div class="col-md-4 mb-3">
        <div class="card bg-dark text-white border-success h-100">
            <div class="card-body text-center d-flex flex-column justify-content-between">
                <div>
                    <span class="badge bg-success mb-2">Popular</span>
                    <h5>Pro Pack</h5>
                    <h2 class="my-3">$50 <small class="fs-6">USD</small></h2>
                    <p>Get <strong>550 KTX</strong> (+10% Bonus)</p>
                </div>
                <button type="button" class="btn btn-success w-100" onclick="openPaymentModal('pro', 'Pro Pack', 50)">
                    Pay with Visa
                </button>
            </div>
        </div>
    </div>

    <!-- Whale Pack -->
    <div class="col-md-4 mb-3">
        <div class="card bg-dark text-white border-warning h-100">
            <div class="card-body text-center d-flex flex-column justify-content-between">
                <div>
                    <span class="badge bg-warning text-dark mb-2">Best Value</span>
                    <h5>Whale Pack</h5>
                    <h2 class="my-3">$100 <small class="fs-6">USD</small></h2>
                    <p>Get <strong>1,200 KTX</strong> (+20% Bonus)</p>
                </div>
                <button type="button" class="btn btn-warning w-100" onclick="openPaymentModal('whale', 'Whale Pack', 100)">
                    Pay with Visa
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal واجهة الدفع السريعة بالفيزا -->
<div class="modal fade" id="visaPaymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="modalPackageTitle">Checkout</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form action="/buy-visa" method="POST" id="paymentForm">
                <div class="modal-body">
                    <input type="hidden" name="package" id="modalPackageInput">
                    
                    <div class="alert alert-info py-2 d-flex justify-content-between align-items-center">
                        <span>Total to Pay:</span>
                        <strong id="modalPriceTag" class="fs-5">$0.00 USD</strong>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Card Holder Name</label>
                        <input type="text" class="form-control bg-secondary text-white border-0" placeholder="e.g. John Doe" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Card Number</label>
                        <input type="text" class="form-control bg-secondary text-white border-0" placeholder="4000 1234 5678 9010" maxlength="19" required>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="text" class="form-control bg-secondary text-white border-0" placeholder="MM/YY" maxlength="5" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">CVV</label>
                            <input type="password" class="form-control bg-secondary text-white border-0" placeholder="123" maxlength="3" required>
                        </div>
                    </div>
                    
                    <small class="text-muted"><i class="bi bi-shield-lock"></i> Secured 256-bit SSL Payment Gateway</small>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success fw-bold">Confirm & Pay</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function openPaymentModal(packageKey, packageName, price) {
    document.getElementById('modalPackageInput').value = packageKey;
    document.getElementById('modalPackageTitle').innerText = 'Pay for ' + packageName;
    document.getElementById('modalPriceTag').innerText = '$' + price.toFixed(2) + ' USD';
    
    var paymentModal = new bootstrap.Modal(document.getElementById('visaPaymentModal'));
    paymentModal.show();
}
</script>

{% extends "base.html" %}

{% block content %}
<div class="glass-card auth-container">
    <div class="auth-header">
        <h2>Welcome Back</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Login to access your KTX dashboard</p>
    </div>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label>Username or Email</label>
            <input type="text" name="login_id" class="form-control" required placeholder="Username or email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent-secondary);">Register</a>
    </p>
</div>
{% endblock %}
